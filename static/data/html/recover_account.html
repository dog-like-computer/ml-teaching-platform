<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="recover.account.title">Recover Account</title>
    <link rel="shortcut icon" href="/static/system_pic/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/static/system_pic/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/recover_account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-user-recover"></i>
            <h2 title="Because of this web is used to study.So this function is too lower to support some background" data-i18n="recover.account.title">Recover Account</h2>
            <p class="sub-title" data-i18n="recover.account.subtitle">Enter your registered information to find your account</p>
        </div>

        <div class="form-box">
            <div class="form-group">
                <label for="recover-username">
                    <i class="fas fa-user"></i> <span data-i18n="recover.account.username">Registered Username</span>
                </label>
                <input type="text" id="recover-username" placeholder="Please enter your registered username" data-i18n="recover.account.username.placeholder">
            </div>
            <div class="form-group">
                <label for="recover-phone">
                    <i class="fas fa-phone"></i> <span data-i18n="recover.account.phone">Registered Phone</span>
                </label>
                <input type="text" id="recover-phone" placeholder="Please enter your registered phone number" data-i18n="recover.account.phone.placeholder">
            </div>
            <div class="form-group">
                <label>
                    <i class="fas fa-shield-halved"></i> <span data-i18n="login.form.captcha">Captcha</span>
                </label>
                <div class="verify-group">
                    <input type="text" id="recover-verify" placeholder="Please enter captcha" data-i18n="login.form.captcha.placeholder">
                    <img src="" alt="Captcha" class="verify-img" id="recover-verify-img">
                </div>
            </div>

            <!-- 找回成功后显示用户ID -->
            <div class="success-msg" id="success-msg">
                <i class="fas fa-check-circle"></i>
                <p data-i18n="recover.account.success">Your User ID: <span id="user-id-display"></span></p>
            </div>

            <div class="error-msg" id="recover-error"></div>
            <div class="action-buttons">
                <a href="/" class="back-btn" data-i18n="recover.account.back">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
                <button id="recover-btn" data-i18n="recover.account.btn">
                    <i class="fas fa-search"></i> Find Account
                </button>
            </div>
        </div>
    </div>
    <script src="/static/javascript/i18n.js"></script>
    <script src="/static/javascript/recover_account.js"></script>
</body>
</html>
