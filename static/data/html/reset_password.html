<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="reset.password.title">Reset Password</title>
    <link rel="shortcut icon" href="/static/system_pic/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/static/system_pic/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/reset_password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-key"></i>
            <h2 data-i18n="reset.password.title">Reset Password</h2>
            <p class="sub-title" data-i18n="reset.password.subtitle">Enter your account information to reset your password</p>
        </div>

        <div class="form-box">
            <div class="form-group">
                <label for="reset-id">
                    <i class="fas fa-id-card"></i> <span data-i18n="reset.password.id">User ID</span>
                </label>
                <input type="text" id="reset-id" placeholder="Please enter your user ID" data-i18n="reset.password.id.placeholder">
            </div>
            <div class="form-group">
                <label for="reset-phone">
                    <i class="fas fa-phone"></i> <span data-i18n="reset.password.phone">Registered Phone</span>
                </label>
                <input type="text" id="reset-phone" placeholder="Please enter your registered phone number" data-i18n="reset.password.phone.placeholder">
            </div>
            <div class="form-group">
                <label>
                    <i class="fas fa-shield-halved"></i> <span data-i18n="login.form.captcha">Captcha</span>
                </label>
                <div class="verify-group">
                    <input type="text" id="reset-verify" placeholder="Please enter captcha" data-i18n="login.form.captcha.placeholder">
                    <img src="" alt="Captcha" class="verify-img" id="reset-verify-img">
                </div>
            </div>
            <div class="form-group">
                <label for="reset-newpwd">
                    <i class="fas fa-lock"></i> <span data-i18n="reset.password.new">New Password</span>
                </label>
                <input type="password" id="reset-newpwd" placeholder="Please enter new password" data-i18n="reset.password.new.placeholder">
                <div class="password-tip" id="newpwd-tip"></div>
            </div>
            <div class="form-group">
                <label for="reset-confirmpwd">
                    <i class="fas fa-lock-open"></i> <span data-i18n="reset.password.confirm">Confirm New Password</span>
                </label>
                <input type="password" id="reset-confirmpwd" placeholder="Please confirm new password" data-i18n="reset.password.confirm.placeholder">
                <div class="error-msg" id="confirmpwd-error"></div>
            </div>

            <div class="error-msg" id="reset-error"></div>
            <div class="action-buttons">
                <a href="/" class="back-btn" data-i18n="reset.password.back">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </a>
                <button id="reset-btn" data-i18n="reset.password.btn">
                    <i class="fas fa-save"></i> Reset Password
                </button>
            </div>
        </div>
    </div>
    <script src="/static/javascript/i18n.js"></script>
    <script src="/static/javascript/reset_password.js"></script>
</body>
</html>
